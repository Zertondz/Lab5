<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vue Clicker</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
<div id="app">
    <p>Счётчик: {{ count }}</p>
    <button @click="count++">НАЖМИ МЕНЯ</button>
</div>
<script>
    const { createApp, ref } = Vue;
    createApp({
        setup() {
            const count = ref(0);
            return { count };
        }
    }).mount('#app');
</script>
</body>
</html>
